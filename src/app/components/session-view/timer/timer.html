<div class="kf-phase" [class.kf-phase--break]="isBreak()">
  {{ isBreak() ? 'PAUSA' : 'FOCO' }}
</div>

<div class="kf-cycle-dots">
  @for (i of cycleArray; track i) {
    <div class="kf-dot" [class]="'kf-dot kf-dot--' + getCycleDotClass(i)"></div>
  }
</div>

<div class="kf-clock">
  <svg class="kf-clock__svg" viewBox="0 0 240 240" aria-hidden="true">
    <circle class="kf-clock__track" cx="120" cy="120" r="100" />
    <circle
      class="kf-clock__progress"
      cx="120" cy="120" r="100"
      [attr.stroke]="progressColor"
      [attr.stroke-dasharray]="progressCircumference"
      [attr.stroke-dashoffset]="progressOffset"
    />
  </svg>
  <div class="kf-clock__face">
    <span class="kf-clock__time">{{ displayTime }}</span>
    <span class="kf-clock__cycle">{{ currentCycle() }}/{{ session?.cycles }}</span>
  </div>
</div>

<div class="kf-timer-controls">
  @if (!timerRunning()) {
    <button class="kf-btn kf-btn--start" (click)="startTimer()">
      {{ hasActiveRun  ? 'RETOMAR' : 'INICIAR' }}
    </button>
  } @else {
    <button class="kf-btn kf-btn--pause" (click)="pauseTimer()">PAUSAR</button>
  }
  <button class="kf-btn kf-btn--stop" (click)="stopTimer()">encerrar</button>
</div>

@if (toast()) {
  <div class="kf-toast">{{ toast() }}</div>
}
